name: Pumpstock
options:
  bundleIdPrefix: com.shimondeitel.pumpstock
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Pumpstock:
    type: application
    platform: iOS
    sources:
      - path: Pumpstock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pumpstock
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Pumpstock/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PumpstockTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PumpstockTests
    dependencies:
      - target: Pumpstock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pumpstock.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PumpstockUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PumpstockUITests
    dependencies:
      - target: Pumpstock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.pumpstock.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Pumpstock:
    build:
      targets:
        Pumpstock: all
        PumpstockTests: [test]
        PumpstockUITests: [test]
    test:
      targets:
        - PumpstockTests
        - PumpstockUITests
